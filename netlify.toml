[build]
  publish = "public"
  command = "hugo --gc --minify"

[build.environment]
  HUGO_VERSION = "0.120.0" # vagy újabb

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Redirects a régi linkekhez
[[redirects]]
  from = "/jovobe-vezet"
  to = "/szolgaltatasok/karrier-es-szakmai-iranykereses/"
  status = 301
  
[[redirects]]
  from = "/letoltheto-oneletrajzok"
  to = "/szolgaltatasok/karrier-es-szakmai-iranykereses/"
  status = 301
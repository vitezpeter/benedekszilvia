<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ProfessionalService",
  "name": "Benedek Szilvia - Munka- és szervezetpszichológus",
  "image": "{{ .Site.BaseURL }}images/logo.png",
  "url": "{{ .Site.BaseURL }}",
  "telephone": "{{ .Site.Params.phone }}",
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "Komjádi Béla u. 3. fsz. 2.",
    "addressLocality": "Budapest",
    "postalCode": "1023",
    "addressCountry": "HU"
  },
  "geo": {
    "@type": "GeoCoordinates",
    "latitude": 47.5222, 
    "longitude": 19.0222 
  },
  "areaServed": {
    "@type": "City",
    "name": "Budapest"
  },
  "priceRange": "16000 HUF - 18000 HUF",
  "openingHoursSpecification": [
    {
      "@type": "OpeningHoursSpecification",
      "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
      "opens": "09:00",
      "closes": "18:00"
    }
  ]
}
</script>

{{ if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "name": "{{ .Title }}",
  "description": "{{ .Description | default .Summary }}",
  "url": "{{ .Permalink }}",
  "breadcrumb": {
    "@type": "BreadcrumbList",
    "itemListElement": [
      {
        "@type": "ListItem",
        "position": 1,
        "name": "Főoldal",
        "item": "{{ .Site.BaseURL }}"
      },
      {{ if .Parent }}
      {
        "@type": "ListItem",
        "position": 2,
        "name": "{{ .Parent.Title }}",
        "item": "{{ .Parent.Permalink }}"
      },
      {{ end }}
      {
        "@type": "ListItem",
        "position": {{ if .Parent }}3{{ else }}2{{ end }},
        "name": "{{ .Title }}"
      }
    ]
  }
}
</script>
{{ end }}
